# TableForge coturn — production TURN/STUN (TLS on 5349)
# Pair with scripts/coturn/generate-certs.sh and docker-compose.yml

listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Replace with your VPS public IP for carrier-grade NAT testing
# external-ip=PUBLIC_IP/PRIVATE_IP

realm=tableforge.local
server-name=tableforge-turn

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET

cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

min-port=49152
max-port=65535

verbose
